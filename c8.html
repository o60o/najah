<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>محاضرات الفصل</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
user-select:none;
-webkit-user-select:none;
font-family:'Tajawal',sans-serif;
background:#f8fafc;
margin:0;
padding:20px;
color:#1e293b;
}

.wrapper{
max-width:900px;
margin:auto;
}

header{
text-align:center;
margin-bottom:25px;
}

.video-box{
width:100%;
aspect-ratio:16/9;
background:black;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:10px;
position:relative;
}

iframe{
width:100%;
height:100%;
border:none;
}

#fullscreenBtn{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.5);
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
z-index:10;
}

.lesson-item{
display:flex;
align-items:center;
padding:15px;
background:white;
border-radius:12px;
margin-bottom:10px;
border:1px solid #e2e8f0;
cursor:pointer;
transition:0.3s;
}

.lesson-item:hover{
background:#f1f5f9;
}

.lesson-title{
flex:1;
font-weight:600;
}

.check{
font-size:20px;
color:#10b981;
display:none;
}

.completed .check{
display:block;
}

button.finish-btn{
background:linear-gradient(90deg,#6366f1,#a855f7);
border:none;
color:white;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

@media (max-width: 600px) {
    img { width:150px; height:150px; }
    p { font-size:1em; }
    a { width:55px; height:55px; font-size:1.5em; }
}
</style>
</head>

<body>

<div class="wrapper">

<header>
<h2>الفصل الثامن</h2>
</header>

<div class="video-box" id="player">
    <button id="fullscreenBtn">🔲 ملء الشاشة</button>
</div>

<div id="lessons">

<div class="lesson-item" data-id="YFvQKQgkcEo" data-index="0">
<span class="lesson-title">المحاضرة 1</span>
<span class="check">✓</span>
</div>

<div class="lesson-item" data-id="NnXjbFNUxOA" data-index="1">
<span class="lesson-title">المحاضرة 2</span>
<span class="check">✓</span>
</div>

<div class="lesson-item" data-id="VXZimoHDpYs" data-index="2">
<span class="lesson-title">المحاضرة 3</span>
<span class="check">✓</span>
</div>

</div>

<button class="finish-btn" onclick="finishLesson()">إنهاء المحاضرة</button>

</div>

<script>
const player = document.getElementById("player")
const lessons = document.querySelectorAll(".lesson-item")
const fullscreenBtn = document.getElementById("fullscreenBtn")
let current = 0

function playVideo(id,index){
    current = index
    player.innerHTML =
    `<iframe src="https://www.youtube.com/embed/${id}?rel=0&modestbranding=1" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
    </iframe>
    <button id="fullscreenBtn">🔲 ملء الشاشة</button>`
    
    // إعادة تفعيل حدث الزر بعد إعادة الكتابة
    document.getElementById("fullscreenBtn").addEventListener("click", ()=>{
        requestFullScreen(player)
    })
}

lessons.forEach(item=>{
    item.addEventListener("click",function(){
        const id = this.dataset.id
        const index = this.dataset.index
        playVideo(id,index)
    })
})

function finishLesson(){
    const item = lessons[current]
    item.classList.add("completed")
    localStorage.setItem("lesson"+current,true)
}

// استعادة حالة الدروس المكتملة
lessons.forEach((item,i)=>{
    if(localStorage.getItem("lesson"+i)){
        item.classList.add("completed")
    }
})

// تشغيل أول درس تلقائياً
lessons[0].click()

// وظيفة ملء الشاشة متوافقة مع جميع المتصفحات
function requestFullScreen(element){
    if(element.requestFullscreen){
        element.requestFullscreen()
    } else if(element.webkitRequestFullscreen){
        element.webkitRequestFullscreen()
    } else if(element.msRequestFullscreen){
        element.msRequestFullscreen()
    }
}

// الحدث للزر الأساسي (للمرة الأولى)
fullscreenBtn.addEventListener("click", ()=>{
    requestFullScreen(player)
})

/* منع كليك يمين */
document.addEventListener("contextmenu", function(e){
    e.preventDefault();
});

/* منع اختصارات الفحص */
document.onkeydown = function(e){
    if(e.keyCode == 123) return false; // F12
    if(e.ctrlKey && e.shiftKey && e.keyCode == 73) return false; // Ctrl+Shift+I
    if(e.ctrlKey && e.shiftKey && e.keyCode == 74) return false; // Ctrl+Shift+J
    if(e.ctrlKey && e.keyCode == 85) return false; // Ctrl+U
    if(e.ctrlKey && e.keyCode == 67) return false; // Ctrl+C
    if(e.ctrlKey && e.keyCode == 83) return false; // Ctrl+S
};

/* كشف فتح DevTools */
setInterval(function(){
    const width = window.outerWidth - window.innerWidth;
    const height = window.outerHeight - window.innerHeight;
    if(width > 160 || height > 160){
        document.body.innerHTML = "تم إيقاف الصفحة بسبب محاولة الفحص";
    }
},1000);
</script>

</body>
</html>
